# PMW3610 trackball candidates
CONFIG_SPI=y
CONFIG_PMW3610=y
CONFIG_PMW3610_SWAP_XY=n
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_Y=y
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_REPORT_INTERVAL_MIN=14

# Cirque TPD uses hardware i2c0. Right-side IQS uses deferred hardware i2c1
# with the Polaris IQS pin assignment: SDA=D4/P0.04, SCL=D8/P1.13, DR=D7/P1.12.
CONFIG_INPUT_PINNACLE=y
CONFIG_ZMK_INPUT_PINNACLE_IDLE_SLEEPER=n
# Disabled while isolating split relay event connection freezes.
# The Pinnacle input driver remains enabled; only the DYA Studio split RPC is off.
# CONFIG_INPUT_PINNACLE_STUDIO_RPC is not set

# Give deferred bus candidates time to settle before initializing child devices.
CONFIG_ZMK_INPUT_MODULE_DEVICE_INIT_DELAY_MS=20
